<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SplitGrid</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/splitgrid.css">
<style>
body{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--bg)}
.landing{width:100%;max-width:440px;padding:32px 20px;text-align:center}
.landing-logo{font-family:'Space Grotesk',sans-serif;font-size:42px;font-weight:800;letter-spacing:-1.5px;margin-bottom:6px}
.landing-logo span{color:var(--blue)}
.landing-tagline{font-size:15px;color:var(--text3);margin-bottom:44px;line-height:1.5}
.landing-cards{display:flex;flex-direction:column;gap:14px}
.landing-card{background:var(--bg3);border:1.5px solid var(--border2);border-radius:16px;padding:26px 22px;cursor:pointer;text-align:left;text-decoration:none;display:flex;align-items:center;gap:20px;transition:all .2s}
.landing-card:hover{border-color:var(--blue);transform:translateY(-2px);background:rgba(59,110,250,.05)}
.lc-icon{font-size:40px;flex-shrink:0}
.lc-title{font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:700;color:var(--text);margin-bottom:5px}
.lc-desc{font-size:13px;color:var(--text3);line-height:1.45}
.lc-arrow{margin-left:auto;font-size:24px;color:var(--blue);font-weight:700;flex-shrink:0}
</style>
</head>
<body>

<div class="landing">
  <div class="landing-logo">Split<span>Grid</span></div>
  <div class="landing-tagline">Divide la cuenta fácilmente.<br>Sin discusiones, sin drama.</div>

  <div class="landing-cards">
    <a class="landing-card" href="splitgrid-cliente.html">
      <div class="lc-icon">🍽️</div>
      <div>
        <div class="lc-title">Soy cliente</div>
        <div class="lc-desc">Únete a una mesa, pide y divide la cuenta con tu grupo</div>
      </div>
      <div class="lc-arrow">→</div>
    </a>
    <a class="landing-card" href="splitgrid-restaurante.html">
      <div class="lc-icon">🏪</div>
      <div>
        <div class="lc-title">Soy restaurante</div>
        <div class="lc-desc">Gestiona mesas, pedidos y pagos en tiempo real</div>
      </div>
      <div class="lc-arrow">→</div>
    </a>
  </div>
</div>

<script src="js/shared.js"></script>
<script>
// Si ya tiene sesión activa, redirigir directo
const _cl = loadClientState();
if (_cl?.user) { window.location.replace('splitgrid-cliente.html'); }
const _db = loadRestDB();
if (_db?._loggedIn) { window.location.replace('splitgrid-restaurante.html'); }
</script>
</body>
</html>
